<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com"/>
  <title>Fortnite PC Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; user-select: none; -webkit-app-region: no-drag; }
    body { background: #06060e; color: #ccc; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a14; }
    ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a2a3e; }

    .mono { font-family: 'Fira Code', monospace; }

    /* Title bar */
    .titlebar {
      -webkit-app-region: drag;
      height: 36px;
      background: linear-gradient(180deg, #0c0c18, #08080f);
      border-bottom: 1px solid #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      flex-shrink: 0;
    }
    .titlebar-btn {
      -webkit-app-region: no-drag;
      width: 14px; height: 14px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      margin-left: 8px;
      transition: filter 0.2s;
    }
    .titlebar-btn:hover { filter: brightness(1.4); }
    .btn-close { background: #ef4444; }
    .btn-max { background: #eab308; }
    .btn-min { background: #22c55e; }

    /* Animations */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    .animate-spin { animation: spin 1s linear infinite; }

    /* Layout */
    .app-root { display: flex; flex-direction: column; height: calc(100vh - 36px); -webkit-app-region: no-drag; }
    .app-body { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* Left nav sidebar — always absolutely positioned so hover doesn't shift layout */
    .nav-sidebar {
      width: 60px;
      background: #08080f;
      border-right: 1px solid #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 12px;
      overflow: hidden;
      z-index: 10;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      transition: width 0.25s ease;
    }
    .nav-sidebar:hover {
      width: 160px;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    }
    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      border: none;
      background: none;
      color: #444;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      white-space: nowrap;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { color: #888; background: #0a0a18; }
    .nav-item.active { color: #a78bfa; border-left-color: #7c3aed; background: #0d0a1e; }
    .nav-item .nav-icon { font-size: 20px; flex-shrink: 0; width: 24px; text-align: center; }
    .nav-item .nav-label { opacity: 0; transition: opacity 0.2s; }
    .nav-sidebar:hover .nav-item .nav-label { opacity: 1; }

    /* Main content area */
    .main-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; margin-left: 60px; }
    .section-page { display: none; flex: 1; overflow: hidden; }
    .section-page.active { display: flex; flex-direction: column; }

    /* Shared components */
    button { font-family: inherit; cursor: pointer; border: none; outline: none; background: none; color: inherit; -webkit-app-region: no-drag; }
    input, textarea, select { -webkit-app-region: no-drag; }
    .scan-btn {
      padding: 8px 20px; border-radius: 8px; font-weight: 700; font-size: 13px;
      letter-spacing: 0.05em; transition: all 0.3s; border: none;
    }
    .scan-btn:not(:disabled):hover { transform: translateY(-1px); filter: brightness(1.1); }
    .opt-btn { font-size: 11px; padding: 2px 8px; border-radius: 4px; transition: all 0.2s; }
    .opt-btn:hover { filter: brightness(1.3); }
    .progress-bar { height: 4px; width: 100%; background: #1a1a2e; flex-shrink: 0; }
    .progress-fill { height: 100%; transition: width 0.3s; background: linear-gradient(90deg, #7c3aed, #a78bfa); }
    .stat-card { border-radius: 8px; padding: 12px; background: #0a0a14; border: 1px solid #12121e; }
    .opt-card { border-radius: 8px; padding: 12px; margin-bottom: 8px; background: #0d0d1a; border: 1px solid #1a1a2e; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

    /* Server card */
    .server-card {
      width: 100%; text-align: left; border-radius: 8px; padding: 12px; margin-bottom: 8px;
      transition: all 0.3s ease; position: relative; overflow: hidden; display: block;
      cursor: pointer; border: 1px solid #12121e; background: #0a0a14; outline: none;
      font-family: inherit; color: inherit;
    }
    .server-card:hover { transform: translateY(-1px); border-color: #222; }
    .server-card.selected { background: #0f0a1e; border-color: #7c3aed; box-shadow: 0 0 20px rgba(124,58,237,0.1); }
    .server-card.best { border-color: #14532d; }

    /* Tunnel toggle */
    .tunnel-toggle {
      width: 52px; height: 28px; border-radius: 14px; border: none; cursor: pointer;
      position: relative; transition: background 0.3s; padding: 0;
    }
    .tunnel-toggle::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 22px; height: 22px; border-radius: 50%; background: #fff;
      transition: transform 0.3s;
    }
    .tunnel-toggle.on { background: #22c55e; }
    .tunnel-toggle.on::after { transform: translateX(24px); }
    .tunnel-toggle.off { background: #333; }
    .tunnel-toggle.connecting { background: #eab308; }
    .tunnel-toggle.connecting::after { animation: pulse 1s infinite; }

    /* Config textarea */
    .config-textarea {
      width: 100%; min-height: 120px; border-radius: 6px; padding: 8px;
      font-family: 'Fira Code', monospace; font-size: 10px;
      background: #08080f; color: #666; border: 1px solid #1a1a2e;
      resize: vertical; outline: none;
    }
    .config-textarea:focus { border-color: #7c3aed; }

    /* Tab bar */
    .tab-bar { display: flex; gap: 0; border-bottom: 1px solid #1a1a2e; flex-shrink: 0; }
    .tab-btn {
      flex: 1; padding: 8px 12px; font-size: 11px; font-weight: 600;
      letter-spacing: 0.05em; border: none; cursor: pointer;
      transition: all 0.2s; border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: #a78bfa; border-bottom-color: #7c3aed; background: #0a0a14; }
    .tab-btn:not(.active) { color: #444; background: #08080f; }
    .tab-btn:not(.active):hover { color: #666; }

    /* Latency bar */
    .lat-bg { width: 96px; height: 8px; border-radius: 99px; overflow: hidden; background: #111; }
    .lat-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }

    /* Net info bar */
    .net-info { display: flex; align-items: center; gap: 12px; padding: 8px 24px; border-bottom: 1px solid #12121e; background: #08080f; flex-shrink: 0; }

    /* Glitch */
    @keyframes glitch {
      0%,90%,100% { clip-path: inset(0); transform: translate(0); }
      92% { clip-path: inset(40% 0 30% 0); transform: translate(-3px,-1px); }
      94% { clip-path: inset(20% 0 50% 0); transform: translate(3px,1px); }
      96% { clip-path: inset(60% 0 10% 0); transform: translate(-2px,2px); }
      98% { clip-path: inset(10% 0 70% 0); transform: translate(2px,-1px); }
    }
    .glitch-text { position: relative; }
    .glitch-text::after {
      content: attr(data-text);
      position: absolute; left: 0; top: 0;
      color: #a78bfa; opacity: 0.5;
      animation: glitch 5s infinite;
    }

    /* Network section layout */
    .net-main { display: flex; flex: 1; overflow: hidden; }
    .net-sidebar { width: 380px; border-right: 1px solid #1a1a2e; background: #08080f; padding: 16px; overflow-y: auto; flex-shrink: 0; }
    .net-center { flex: 1; overflow-y: auto; padding: 24px; background: #06060e; }
    .net-right { width: 320px; border-left: 1px solid #1a1a2e; background: #08080f; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }

    /* Debloat / Tweaks / OC / BIOS section */
    .full-section { flex: 1; overflow-y: auto; padding: 24px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid #1a1a2e; background: linear-gradient(180deg, #0a0a18, #06060e); flex-shrink: 0;
    }

    /* Action button styles */
    .action-btn {
      padding: 6px 16px; border-radius: 6px; font-size: 11px; font-weight: 600;
      letter-spacing: 0.05em; transition: all 0.2s; border: none; cursor: pointer;
    }
    .action-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .action-btn.purple { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; }
    .action-btn.green { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
    .action-btn.red { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
    .action-btn.orange { background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; }
    .action-btn.ghost { background: #1a0a2e; color: #a78bfa; border: 1px solid #2e1065; }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }

    /* Status badges */
    .badge {
      font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600;
      letter-spacing: 0.05em; display: inline-block;
    }
    .badge-applied { background: #052e16; color: #22c55e; border: 1px solid #14532d; }
    .badge-removed { background: #052e16; color: #22c55e; border: 1px solid #14532d; }
    .badge-disabled { background: #052e16; color: #22c55e; border: 1px solid #14532d; }
    .badge-failed { background: #1a0505; color: #ef4444; border: 1px solid #331111; }
    .badge-admin { background: #1a0505; color: #ef4444; border: 1px solid #331111; }
    .badge-pending { background: #1a1a2e; color: #666; border: 1px solid #222; }
    .badge-applying { background: #1a1500; color: #eab308; border: 1px solid #422006; }

    /* Item card */
    .item-card {
      border-radius: 8px; padding: 14px; margin-bottom: 8px; background: #0d0d1a;
      border: 1px solid #1a1a2e; transition: border-color 0.2s;
    }
    .item-card:hover { border-color: #2a2a3e; }
    .item-card.done { border-color: #14532d; background: #080f0a; }
    .item-card.danger { border-color: #ef4444; border-left: 3px solid #ef4444; }

    /* Collapsible */
    .collapse-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; background: #0a0a14; border: 1px solid #12121e;
      border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: all 0.2s;
    }
    .collapse-header:hover { border-color: #2a2a3e; }
    .collapse-header.open { border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom: 0; }
    .collapse-body {
      background: #08080f; border: 1px solid #12121e; border-top: none;
      border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;
      padding: 12px; margin-bottom: 8px;
    }

    /* HW monitor cards */
    .hw-card {
      border-radius: 10px; padding: 16px; background: linear-gradient(135deg, #0a0a14, #0d0d1a);
      border: 1px solid #1a1a2e;
    }
    .monitor-value {
      font-family: 'Fira Code', monospace; font-size: 24px; font-weight: 700;
    }
    .monitor-bar {
      height: 6px; border-radius: 3px; background: #1a1a2e; overflow: hidden; margin-top: 4px;
    }
    .monitor-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s, background 0.5s; }

    /* Preset buttons */
    .preset-btn {
      padding: 10px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
      background: #0a0a14; border: 1px solid #1a1a2e; color: #888;
      transition: all 0.2s; cursor: pointer; text-align: center;
    }
    .preset-btn:hover { border-color: #7c3aed; color: #a78bfa; }
    .preset-btn.active-preset { background: #1a0a2e; border-color: #7c3aed; color: #a78bfa; }
    .preset-btn.preset-aggressive { border-color: #ef4444; }
    .preset-btn.preset-aggressive:hover { color: #ef4444; }

    /* BIOS guide card */
    .bios-guide-item {
      border-radius: 8px; padding: 14px; margin-bottom: 8px; background: #0d0d1a;
      border: 1px solid #1a1a2e;
    }
    .impact-high { color: #ef4444; }
    .impact-medium { color: #eab308; }
    .impact-low { color: #22c55e; }

    /* Confirm overlay */
    .confirm-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    .confirm-box {
      background: #0d0d1a; border: 1px solid #1a1a2e; border-radius: 12px;
      padding: 32px; max-width: 400px; text-align: center;
    }

    /* Sub-tab bar for debloat */
    .sub-tab-bar { display: flex; gap: 4px; padding: 0 24px; flex-shrink: 0; }
    .sub-tab {
      padding: 8px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
      border: none; cursor: pointer; transition: all 0.2s; border-radius: 6px 6px 0 0;
      border-bottom: 2px solid transparent;
    }
    .sub-tab.active { color: #a78bfa; background: #0a0a14; border-bottom-color: #7c3aed; }
    .sub-tab:not(.active) { color: #444; background: transparent; }
    .sub-tab:not(.active):hover { color: #666; }

    /* Stress test progress */
    .stress-bar {
      height: 8px; border-radius: 4px; background: #1a1a2e; overflow: hidden;
    }
    .stress-fill {
      height: 100%; border-radius: 4px; transition: width 0.3s;
      background: linear-gradient(90deg, #f97316, #ef4444);
    }

    /* Filter chips */
    .filter-chip {
      padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
      border: 1px solid #1a1a2e; background: #0a0a14; color: #666;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-chip.active { background: #1a0a2e; border-color: #7c3aed; color: #a78bfa; }
    .filter-chip:hover { border-color: #333; }
  </style>
</head>
<body>
  <!-- Custom title bar -->
  <div class="titlebar">
    <span class="mono" style="font-size:11px;color:#333;">fortnite-pc-optimizer</span>
    <div style="display:flex;align-items:center;">
      <button class="titlebar-btn btn-min" onclick="window.api.windowMinimize()"></button>
      <button class="titlebar-btn btn-max" onclick="window.api.windowMaximize()"></button>
      <button class="titlebar-btn btn-close" onclick="window.api.windowClose()"></button>
    </div>
  </div>

  <div id="app" class="app-root"></div>

  <script>
    // ── Server metadata ─────────────────────────────────────────────
    const SERVERS = [
      { id:"nae", name:"NA-East", city:"Virginia", flag:"\u{1F1FA}\u{1F1F8}" },
      { id:"naw", name:"NA-West", city:"Oregon", flag:"\u{1F1FA}\u{1F1F8}" },
      { id:"nac", name:"NA-Central", city:"Ohio", flag:"\u{1F1FA}\u{1F1F8}" },
      { id:"dal", name:"NA-South", city:"Dallas", flag:"\u{1F1FA}\u{1F1F8}" },
      { id:"eu1", name:"EU-West", city:"London", flag:"\u{1F1EC}\u{1F1E7}" },
      { id:"eu2", name:"EU-Central", city:"Frankfurt", flag:"\u{1F1E9}\u{1F1EA}" },
      { id:"oce", name:"Oceania", city:"Sydney", flag:"\u{1F1E6}\u{1F1FA}" },
      { id:"br",  name:"Brazil", city:"S\u00e3o Paulo", flag:"\u{1F1E7}\u{1F1F7}" },
      { id:"asia",name:"Asia", city:"Tokyo", flag:"\u{1F1EF}\u{1F1F5}" },
      { id:"me",  name:"Middle East", city:"Bahrain", flag:"\u{1F1E7}\u{1F1ED}" },
      { id:"ind", name:"India", city:"Mumbai", flag:"\u{1F1EE}\u{1F1F3}" },
    ];

    const OPTIMIZATIONS = [
      { id:"dns", title:"DNS Flush & Optimize", desc:"Purge stale DNS cache, switch to Cloudflare 1.1.1.1 for faster resolution.", cmd:'ipconfig /flushdns && netsh interface ip set dns "Ethernet" static 1.1.1.1' },
      { id:"nagle", title:"Disable Nagle's Algorithm", desc:"Kill TCP packet batching \u2014 send every game packet immediately.", cmd:'reg add HKLM\\...\\Interfaces\\{id} /v TcpAckFrequency /t REG_DWORD /d 1 /f' },
      { id:"throttle", title:"Disable Network Throttling", desc:"Remove Windows default network throttle cap.", cmd:'reg add HKLM\\SOFTWARE\\Microsoft\\Windows NT\\...\\Multimedia /v NetworkThrottlingIndex /t REG_DWORD /d 0xFFFFFFFF /f' },
      { id:"qos", title:"QoS Priority Boost", desc:"Set Fortnite traffic to highest priority class.", cmd:'reg add HKLM\\SOFTWARE\\Policies\\...\\Psched /v NonBestEffortLimit /t REG_DWORD /d 0 /f' },
      { id:"mtu", title:"Optimize MTU Size", desc:"Eliminate packet fragmentation on your route.", cmd:'netsh interface ipv4 set subinterface "Ethernet" mtu=1472 store=persistent' },
      { id:"tcp", title:"TCP Auto-Tuning", desc:"Set receive window to experimental for max throughput.", cmd:'netsh int tcp set global autotuninglevel=experimental' },
      { id:"rss", title:"Receive-Side Scaling", desc:"Spread network load across all CPU cores.", cmd:'netsh int tcp set global rss=enabled' },
      { id:"ecn", title:"ECN Capability", desc:"Let routers signal congestion before dropping packets.", cmd:'netsh int tcp set global ecncapability=enabled' },
    ];

    // ── State ───────────────────────────────────────────────────────
    let state = {
      activeSection: "network", // network | debloat | tweaks | overclock | bios
      // Network
      phase: "idle",
      results: {},
      pingHistory: {},
      selected: null,
      best: null,
      hops: [],
      opts: {},
      scanCount: 0,
      scanProgress: 0,
      networkInfo: [],
      tracingRoute: false,
      rightTab: "opts",
      tunnelStatus: "disconnected",
      tunnelInstalled: false,
      tunnelHasConfig: false,
      tunnelStats: { tx: 0, rx: 0, endpoint: null },
      tunnelConfig: "",
      tunnelError: "",
      tunnelDetectLog: [],
      tunnelWgPath: null,
      benchPhase: "idle",
      benchServer: null,
      benchBaseline: null,
      benchTunnel: null,
      benchProgress: 0,
      benchHistory: [],
      // Updater
      update: {
        status: "idle",
        currentVersion: null,
        newVersion: null,
        releaseNotes: "",
        downloadProgress: 0,
        error: null,
      },
      // Debloat
      debloatTab: "apps",
      debloatApps: [],
      debloatServices: [],
      debloatTelemetry: [],
      debloatPerf: [],
      debloatScanning: false,
      debloatNuking: false,
      debloatConfirm: null,
      // Tweaks
      tweakCategories: [],
      tweaksApplied: {},
      tweakApplying: {},
      tweakCollapsed: {},
      // Overclock
      hwInfo: null,
      hwStatsData: null,
      hwGpuPresets: [],
      hwCpuPresets: [],
      hwRamTweaks: [],
      hwActiveGpu: null,
      hwActiveCpu: null,
      hwStressing: false,
      hwStressProgress: 0,
      hwStressDuration: 10,
      hwPolling: false,
      hwAutoTuning: false,
      hwAutoTuneLog: [],
      hwAutoTuneFinal: null,
      hwCrashLog: [],
      scewinAvailable: false,
      aiOCRunning: false,
      aiOCPhase: "idle",
      aiOCProgress: 0,
      aiOCLog: [],
      aiOCSummary: null,
      // Dependencies
      deps: null, // { wireguard, nvidiaSmi, scewin, missingCount }
      depsInstalling: null, // depId being installed
      depsDismissed: false,
      // BIOS
      biosInfoData: null,
      biosHiddenData: [],
      biosGuideData: [],
      biosCpuFilter: "all",
      biosConfirm: null,
    };

    let hwPollInterval = null;

    // ── Helpers ──────────────────────────────────────────────────────
    function pingColor(p) { return p<0?"#555":p<=20?"#22c55e":p<=40?"#84cc16":p<=60?"#eab308":p<=100?"#f97316":p<=150?"#ef4444":"#dc2626"; }
    function pingLabel(p) { return p<0?"TIMEOUT":p<=20?"GODLIKE":p<=40?"EXCELLENT":p<=60?"GOOD":p<=100?"PLAYABLE":p<=150?"ROUGH":"UNPLAYABLE"; }
    function pingEmoji(p) { return p<0?"\u274C":p<=20?"\u26A1":p<=40?"\u{1F525}":p<=60?"\u2705":p<=100?"\u26A0\uFE0F":"\u{1F480}"; }

    function sparklineSVG(data, w, h, color) {
      if (data.length < 2) return "";
      const mn = Math.min(...data), mx = Math.max(...data), rng = mx-mn||1, step = w/(data.length-1);
      const pts = data.map((v,i) => `${i*step},${h-((v-mn)/rng)*(h-4)-2}`).join(" ");
      const fill = `0,${h} ${pts} ${w},${h}`;
      const gid = `sg${color.replace("#","")}_${w}_${Math.random().toString(36).slice(2,6)}`;
      return `<svg width="${w}" height="${h}" style="display:inline-block">
        <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient></defs>
        <polygon points="${fill}" fill="url(#${gid})"/>
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>`;
    }

    function gaugeHTML(ping, size=140) {
      const r=(size-16)/2, c=2*Math.PI*r, ratio=Math.min(Math.max(ping,0)/250,1), off=c-ratio*c, col=pingColor(ping);
      return `<div style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:${size}px;height:${size}px">
        <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
          <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1a1a2e" stroke-width="8"/>
          <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="8"
            stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"
            style="transition:stroke-dashoffset 0.8s ease,stroke 0.5s ease"/>
        </svg>
        <div style="position:absolute;display:flex;flex-direction:column;align-items:center">
          <span class="mono" style="font-size:30px;font-weight:700;color:${col}">${ping < 0 ? "---" : ping}</span>
          <span class="mono" style="font-size:11px;color:#555">ms</span>
        </div>
      </div>`;
    }

    function tempColor(t) { return t < 50 ? "#22c55e" : t < 70 ? "#eab308" : t < 85 ? "#f97316" : "#ef4444"; }
    function usageColor(u) { return u < 50 ? "#22c55e" : u < 75 ? "#eab308" : u < 90 ? "#f97316" : "#ef4444"; }
    function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    async function runScan() {
      state.phase = "scanning";
      state.results = {};
      state.selected = null;
      state.hops = [];
      state.scanProgress = 0;
      render();

      for (let i = 0; i < SERVERS.length; i++) {
        const srv = SERVERS[i];
        try {
          const res = await window.api.pingServer(srv.id);
          state.results[srv.id] = res;
          if (!state.pingHistory[srv.id]) state.pingHistory[srv.id] = [];
          if (res.ping > 0) state.pingHistory[srv.id].push(res.ping);
          if (state.pingHistory[srv.id].length > 20) state.pingHistory[srv.id] = state.pingHistory[srv.id].slice(-20);
        } catch (e) {
          state.results[srv.id] = { ping: -1, jitter: 0, loss: 100, ip: "error" };
        }
        state.scanProgress = ((i + 1) / SERVERS.length) * 100;
        render();
      }

      let best = null, bestPing = Infinity;
      for (const [id, data] of Object.entries(state.results)) {
        if (data.ping > 0 && data.ping < bestPing) { bestPing = data.ping; best = id; }
      }
      state.best = best;
      state.phase = "done";
      state.scanCount++;

      if (best) {
        state.selected = best;
        await loadTraceroute(best);
      }
      render();
    }

          if (progress) {
            state.aiOCPhase = progress.phase || "idle";

            state.aiOCLog = progress.log || [];

          }
        } catch(e) {}
      }, 3000);

      try {
        const result = await window.api.hwAiAutoOC({});
        if (result.summary) state.aiOCSummary = result.summary;
        // Final progress fetch
        const progress = await window.api.hwAiProgress();
        if (progress) {
          state.aiOCPhase = progress.phase || "idle";
          state.aiOCProgress = 100;
          state.aiOCLog = progress.log || [];
        }
      } catch(e) {
        state.aiOCLog.push({ phase: "error", message: "AI OC failed: " + e.message });
      }

      clearInterval(aiOCPollInterval);
      aiOCPollInterval = null;
      state.aiOCRunning = false;
      render();
    }

    async function stopAIOC() {
      try {
        await window.api.hwAiStop();
      } catch(e) {}
      if (aiOCPollInterval) { clearInterval(aiOCPollInterval); aiOCPollInterval = null; }
      state.aiOCRunning = false;
      state.aiOCPhase = "idle";
      state.aiOCLog.push({ phase: "stop", message: "AI OC stopped by user" });
      render();
    }

    // ── BIOS ────────────────────────────────────────────────────────
    async function loadBiosData() {
      try {
        const [info, hidden, guide] = await Promise.all([
          window.api.biosInfo(),
          window.api.biosHidden(),
          window.api.biosGuide(),
        ]);
        state.biosInfoData = info;
        state.biosHiddenData = hidden?.settings || hidden || [];
        state.biosGuideData = guide || [];
      } catch(e) {
        console.error("Failed to load BIOS data:", e);
      }
      render();
    }

    function setBiosCpuFilter(f) { state.biosCpuFilter = f; render(); }

    function showBiosRebootConfirm() { state.biosConfirm = "reboot"; render(); }

    async function doBiosReboot() {
      state.biosConfirm = null;
      render();
      try {
        await window.api.biosReboot();
      } catch(e) {
        console.error(e);
      }
    }

    async function applyBcdSetting(setting, value) {
      try {

      render();

        if (filtered.length === 0) {
          html += `<div style="padding:24px;text-align:center;border-radius:8px;background:#0a0a14;border:1px solid #12121e">
            <div class="mono" style="color:#333">// no guide items match the current filter</div>
          </div>`;
        }
      } else {
        html += `<div style="padding:24px;text-align:center;border-radius:8px;background:#0a0a14;border:1px solid #12121e">
          <div class="mono" style="color:#333">// click REFRESH to load the BIOS optimization guide</div>
        </div>`;
      }

      html += `</div>`; // end full-section
      html += `</div>`; // end bios section

      html += `</div>`; // end main-content
      html += `</div>`; // end app-body

      // ── Confirmation Overlays ──
      if (s.debloatConfirm === "nuke") {
        html += `<div class="confirm-overlay" onclick="cancelConfirm()">
          <div class="confirm-box" onclick="event.stopPropagation()">
            <div style="font-size:48px;margin-bottom:12px">\u2622\uFE0F</div>
            <div style="font-size:18px;font-weight:700;color:#ef4444;margin-bottom:8px">NUCLEAR OPTION</div>
            <div style="font-size:13px;color:#888;margin-bottom:24px">This will remove ALL bloatware apps, disable ALL unnecessary services, apply ALL telemetry blocks, and ALL performance tweaks. This cannot be undone.</div>
            <div style="display:flex;gap:12px;justify-content:center">
              <button onclick="cancelConfirm()" class="action-btn ghost" style="padding:10px 24px">CANCEL</button>
              <button onclick="debloatFullNuke()" class="action-btn red" style="padding:10px 24px">NUKE EVERYTHING</button>
            </div>
          </div>
        </div>`;
      }

      if (s.biosConfirm === "reboot") {
        html += `<div class="confirm-overlay" onclick="cancelConfirm()">
          <div class="confirm-box" onclick="event.stopPropagation()">
            <div style="font-size:48px;margin-bottom:12px">\u{1F504}</div>
            <div style="font-size:18px;font-weight:700;color:#eab308;margin-bottom:8px">REBOOT TO BIOS</div>
            <div style="font-size:13px;color:#888;margin-bottom:24px">Your PC will restart immediately and boot into BIOS/UEFI settings. Save any open work first.</div>
            <div style="display:flex;gap:12px;justify-content:center">
              <button onclick="cancelConfirm()" class="action-btn ghost" style="padding:10px 24px">CANCEL</button>
              <button onclick="doBiosReboot()" class="action-btn orange" style="padding:10px 24px">REBOOT NOW</button>
            </div>
          </div>
        </div>`;
      }

      app.innerHTML = html;
    }

    // ── Init ─────────────────────────────────────────────────────────
    async function init() {
      try {
        state.networkInfo = await window.api.getNetworkInfo();
        await refreshTunnelStatus();
        await loadTunnelConfig();
        if (window.api.updaterStatus) {
          const us = await window.api.updaterStatus();
          if (us) state.update = us;
        }
      } catch(e) {}
      render();

      // Preload data for other sections in background
      setTimeout(async () => {
        try { await checkDeps(); } catch(e) {}
        try { await loadDebloatData(); } catch(e) {}
        try { await loadTweaks(); } catch(e) {}
        try { await loadHwData(); } catch(e) {}
        try { await loadBiosData(); } catch(e) {}
      }, 500);
    }
    init();
  </script>
</body>
</html>
